async function completeSetupRestaurant(){
  const fieldIds = ['setup-name','setup-address','setup-postal','setup-city','setup-currency'];
  clearFormErrors('setup-error-slot', fieldIds);
  const name = ((document.getElementById('setup-name')||{}).value || '').trim();
  if(!name){ showFormError('setup-error-slot', "Le nom de l'établissement est requis.", ['setup-name']); return; }
  const address = ((document.getElementById('setup-address')||{}).value || '').trim();
  const postalCode = ((document.getElementById('setup-postal')||{}).value || '').trim();
  const city = ((document.getElementById('setup-city')||{}).value || '').trim() || '—';
  const currency = (document.getElementById('setup-currency')||{}).value || 'EUR';

  try{
    const data = await apiRequest('/api/restaurants', { method:'POST', body:{ name, address, postalCode, city, currency } });

    // Le catalogue, l'équipe, les commandes... continuent de fonctionner en mémoire pour
    // l'instant (seule la couche compte/établissement est déjà connectée au vrai serveur) —
    // on garde donc aussi une copie locale, reliée à l'établissement réel par remoteId.
    const newId = 'r'+nextId();
    RESTOS.push({id:newId, name, address, postalCode, city, currency, remoteId: data.restaurant.id});
    ensureRestoData(newId);
    state.resto = newId;
    loadRestoData(newId);

    if(ACCOUNT && !CREDENTIALS.patron.username){
      const derived = ACCOUNT.email.split('@')[0].toLowerCase().replace(/[^a-z0-9.]/g,'') || 'patron';
      CREDENTIALS.patron.username = derived;
      CREDENTIALS.patron.password = generateDefaultPassword(derived);
      if(!NOTIF_STATE.patron.email) NOTIF_STATE.patron.email = ACCOUNT.email;
      toast('Établissement créé — identifiant équipe : ' + CREDENTIALS.patron.username);
    } else {
      toast('Établissement créé — bienvenue !');
    }
    goToSite('team-login');
  } catch(err){
    showFormError('setup-error-slot', err.message, fieldIds);
  }
}

function render(){
  document.documentElement.classList.toggle('theme-dark', state.theme==='dark');
  if(state.site==='marketing'){
    document.title = 'Mise & Sûre — la gestion de restaurant, sans friction';
    document.getElementById('app').innerHTML = renderMarketingPage();
    return;
  }
  if(state.site==='pricing'){
    document.title = 'Tarifs — Mise & Sûre';
    document.getElementById('app').innerHTML = renderPricingPage();
    return;
  }
  if(state.site==='account-auth'){
    document.title = 'Connexion — Mise & Sûre';
    document.getElementById('app').innerHTML = renderAccountAuthPage();
    return;
  }
  if(state.site==='admin'){
    document.title = 'Administration — Mise & Sûre';
    document.getElementById('app').innerHTML = renderAdminPage();
    return;
  }
  if(state.site==='verify-email'){
    document.title = 'Vérification — Mise & Sûre';
    document.getElementById('app').innerHTML = renderVerifyEmailPage();
    return;
  }
  if(state.site==='reset-password'){
    document.title = 'Réinitialisation — Mise & Sûre';
    document.getElementById('app').innerHTML = renderResetPasswordPage();
    return;
  }
  if(state.site==='setup-restaurant'){
    document.title = 'Créer votre établissement — Mise & Sûre';
    document.getElementById('app').innerHTML = renderSetupRestaurantPage();
    return;
  }
  if(!state.loggedIn){
    document.title = 'Mise & Sûre — plateforme de gestion pour restaurants';
    document.getElementById('app').innerHTML = renderLoginScreen();
    return;
  }
  destroyCharts();
  const resto = RESTOS.find(r=>r.id===state.resto);
  if(resto) document.title = resto.name + ' — Mise & Sûre';
  const {sidebarHtml, topbarHtml} = renderShell();
  document.getElementById('app').innerHTML = `
    ${sidebarHtml}
    <div class="main">
      ${topbarHtml}
      ${renderBanner()}
      <div class="content">${renderContent()}</div>
    </div>
  `;
  requestAnimationFrame(drawCharts);
}

async function loadTeamInvite(token){
  try{
    const data = await apiRequest(`/api/restaurants/public/invite/${token}`);
    const localId = 'r'+nextId();
    RESTOS.push({
      id: localId, name: data.restaurant.name, address:'', postalCode:'',
      city: data.restaurant.city, currency:'EUR', remoteId: data.restaurant.id,
    });
    const d = ensureRestoData(localId);
    d.team = data.team.map(m => ({
      id: 't'+nextId(), remoteId: m.id, name: m.name, role: m.role,
      shift:'', status:'actif', username:null, photoDataUrl: m.photo_url,
    }));
    state.resto = localId;
    loadRestoData(localId);
    state.site = 'team-login';
    window.history.replaceState({ site: 'team-login' }, '', window.location.pathname);
    render();
  } catch(err){
    toast(err.message, 'alert');
    goToSite('marketing');
  }
}

  // arrivent dans l'URL — on les récupère et on nettoie l'adresse tout de suite après.
  const urlParams = new URLSearchParams(window.location.search);
  const tokenFromUrl = urlParams.get('token');
  const oauthError = urlParams.get('oauth') === 'error';
  const checkoutCancelled = urlParams.get('checkout') === 'cancelled';
  const checkoutSuccess = urlParams.get('checkout') === 'success';
  const equipeToken = urlParams.get('equipe');
  if(equipeToken){
    // Lien personnel d'un membre de l'équipe : ce chemin est totalement indépendant du compte
    // du patron (aucun email, aucun abonnement) — on saute directement à l'écran de connexion
    // de son établissement précis.
    window.history.replaceState({}, document.title, window.location.pathname);
    await loadTeamInvite(equipeToken);
    return;
  }
  if(tokenFromUrl){
    AUTH_TOKEN = tokenFromUrl;
    localStorage.setItem(AUTH_TOKEN_KEY, tokenFromUrl);
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  if(oauthError){
    toast("La connexion via Google/Apple a échoué. Merci de réessayer.", 'alert');
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  if(checkoutCancelled){
    toast("Paiement annulé — vous pouvez réessayer à tout moment.", 'alert');
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  if(checkoutSuccess){
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  try{
    const meData = await apiRequest('/api/auth/me');
    ACCOUNT = meData.user;
    try{
      // C'est CETTE étape qui vérifie réellement l'abonnement, quelle que soit la façon dont
      // la personne s'est connectée (email, Google ou Apple) — le serveur bloque avec le code
      // SUBSCRIPTION_REQUIRED si le paiement n'est pas actif.
      //
      // Juste après un paiement Stripe réussi, le navigateur peut revenir sur le site un peu
      // AVANT que Stripe n'ait fini de prévenir notre serveur (le "webhook") que le paiement est
      // passé — sans ça, on risquerait de croire à tort que la personne n'a toujours pas payé.
      // On retente donc plusieurs fois, avec une petite pause, uniquement dans ce cas précis.
      let restosData;
      const maxAttempts = checkoutSuccess ? 6 : 1;
      for(let attempt=1; attempt<=maxAttempts; attempt++){
        try{
          restosData = await apiRequest('/api/restaurants');
          break;
        } catch(e){
          const isLastAttempt = attempt===maxAttempts;
          if(e.code!=='SUBSCRIPTION_REQUIRED' || isLastAttempt) throw e;
          await new Promise(r=>setTimeout(r, 1200));
        }
      }
      state.site = (restosData.restaurants && restosData.restaurants.length) ? 'team-login' : 'setup-restaurant';
      if(restosData.restaurants && restosData.restaurants.length){
        // Le compte a déjà un ou plusieurs établissements réels côté serveur (créés avant ce
        // rechargement de page — après un paiement, par exemple) : on les recharge vraiment
        // dans l'application, plutôt que de repartir d'une liste vide comme si tout avait
        // disparu. Le catalogue/équipe/commandes restent pour l'instant en mémoire locale (voir
        // note plus haut), reliés à l'établissement réel par remoteId.
        RESTOS = restosData.restaurants.map(r => ({
          id: 'r'+nextId(),
          name: r.name,
          address: r.address,
          postalCode: r.postal_code,
          city: r.city,
          currency: r.currency,
          remoteId: r.id,
        }));
        RESTOS.forEach(r => ensureRestoData(r.id));
        state.resto = RESTOS[0].id;
        loadRestoData(RESTOS[0].id);
        syncRestoOperationalData(RESTOS[0].id);
      }
    } catch(restoErr){
      if(restoErr.code === 'SUBSCRIPTION_REQUIRED'){
        // Compte connecté mais pas encore payé : on le laisse sur la page d'accueil, il ira
        // sur "Tarifs" et choisira de payer quand il le souhaite — jamais de redirection forcée.
        state.site = 'marketing';
        window.history.replaceState({ site: state.site }, '', window.location.pathname);
        render();
        return;
      }
      throw restoErr;
    }
  } catch(err){
    // Pas de session active : reste sur 'marketing' (valeur par défaut de state.site), c'est normal.
  }
  window.history.replaceState({ site: state.site }, '', window.location.pathname);
  render();
}
checkExistingSession();
</script>
</body>
</html>
